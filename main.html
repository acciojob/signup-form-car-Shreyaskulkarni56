<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->

		<form method="post">
		<!-- Name Field -->
		<label for="name">Name</label>
		<input type="text" required="Yes" id="name" placeholder="Name">
		<br><br>
			<!-- Email Field -->
		<label for="email">Email</label>
		<input type="email" required="Yes" id="email" placeholder="Email">
		<br><br>
			<!-- Gender Filed -->
		<p>Gender</p>
		<input type="radio" name="gender" id="gender_m" required>
		<label for="gender_m">Male</label>

		<input type="radio" name="gender" id="gender_f" required>
		<label for="gender_f">Female</label>

		<br><br>
		<!-- Car Brands Field -->
		<label for="cars">Car Brands</label>
		<select id="cars" name="car_brand" required>
		  <option value="" disabled selected>--Please choose an option--</option>
		  <option value="toyota">Toyota</option>
		  <option value="ford">Ford</option>
		  <option value="honda">Honda</option>
		</select>
		<br><br>

		<br><br>
		<!-- Phone Number Field -->
		<label for="age">Age</label>
		<input type=" number" id="age" placeholder="Age">
		<br><br>
			<!-- DOB Field -->
		<label for="dob">DOB</label>
		<input type="date" required = "yes" id="dob" >
		<br><br>

		<br><br>
		<!-- Phone Number Field -->
		<label for="phone">Phone Number</label>
		<input type="tel" id="phone" placeholder="xxx-xxx-xxxx">
		<br><br>

       <!-- Password Field -->
		<label for="password">Password</label>
		<input type="password" id="password" placeholder="Password" required>
		<br><br>
		<!-- Checkbox Field -->
		
		<label for="tos">I agree to the TOS</label>
			<input type="checkbox" id="tos" required="yes">
		<br><br>

		<!-- Submit Button -->
		<button type="submit">Submit</button>
	</form>

    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
